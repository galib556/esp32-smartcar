<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="960" height="620" fill="#1c1c1e"/>

  <!-- Title -->
  <text x="480" y="30" text-anchor="middle" fill="#f0f0f0" font-size="15" font-weight="bold">ESP32 WiFi RC Car — Wiring Diagram (Phase 1)</text>

  <!-- ═══════════════════════════════════════════
       ESP32 BOARD
  ════════════════════════════════════════════ -->
  <rect x="40" y="60" width="155" height="400" rx="10" fill="#1a237e" stroke="#5c6bc0" stroke-width="2"/>
  <rect x="55" y="70" width="125" height="20" rx="3" fill="#283593"/>
  <text x="117" y="84" text-anchor="middle" fill="#e8eaf6" font-size="11" font-weight="bold">ESP32</text>
  <text x="117" y="98" text-anchor="middle" fill="#9fa8da" font-size="9">Dev Module 30-pin</text>

  <!-- USB port visual -->
  <rect x="75" y="440" width="65" height="14" rx="3" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <text x="108" y="450" text-anchor="middle" fill="#90a4ae" font-size="8">USB</text>

  <!-- ESP32 right-side pin dots and labels -->
  <!-- GND -->
  <circle cx="195" cy="135" r="5" fill="#ef5350"/>
  <text x="183" y="139" text-anchor="end" fill="#ef9a9a" font-size="10">GND</text>

  <!-- GPIO 16 -->
  <circle cx="195" cy="165" r="5" fill="#66bb6a"/>
  <text x="183" y="169" text-anchor="end" fill="#a5d6a7" font-size="10">16</text>

  <!-- GPIO 17 -->
  <circle cx="195" cy="193" r="5" fill="#66bb6a"/>
  <text x="183" y="197" text-anchor="end" fill="#a5d6a7" font-size="10">17</text>

  <!-- GPIO 22 -->
  <circle cx="195" cy="221" r="5" fill="#ffd54f"/>
  <text x="183" y="225" text-anchor="end" fill="#fff176" font-size="10">22</text>

  <!-- GPIO 18 -->
  <circle cx="195" cy="265" r="5" fill="#42a5f5"/>
  <text x="183" y="269" text-anchor="end" fill="#90caf9" font-size="10">18</text>

  <!-- GPIO 19 -->
  <circle cx="195" cy="293" r="5" fill="#42a5f5"/>
  <text x="183" y="297" text-anchor="end" fill="#90caf9" font-size="10">19</text>

  <!-- GPIO 23 -->
  <circle cx="195" cy="321" r="5" fill="#ffd54f"/>
  <text x="183" y="325" text-anchor="end" fill="#fff176" font-size="10">23</text>

  <!-- VIN (receives 5V from L298N) -->
  <circle cx="195" cy="365" r="5" fill="#ff7043"/>
  <text x="183" y="369" text-anchor="end" fill="#ffab91" font-size="10">VIN</text>

  <!-- Right motor label bracket -->
  <line x1="50" y1="155" x2="50" y2="230" stroke="#4caf50" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="46" y="197" text-anchor="middle" fill="#81c784" font-size="8" transform="rotate(-90,46,197)">RIGHT MOTOR</text>

  <!-- Left motor label bracket -->
  <line x1="50" y1="255" x2="50" y2="330" stroke="#2196f3" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="46" y="295" text-anchor="middle" fill="#64b5f6" font-size="8" transform="rotate(-90,46,295)">LEFT MOTOR</text>

  <!-- ═══════════════════════════════════════════
       L298N MODULE
  ════════════════════════════════════════════ -->
  <rect x="380" y="80" width="200" height="340" rx="10" fill="#1b5e20" stroke="#43a047" stroke-width="2"/>
  <rect x="395" y="90" width="170" height="20" rx="3" fill="#2e7d32"/>
  <text x="480" y="104" text-anchor="middle" fill="#e8f5e9" font-size="11" font-weight="bold">L298N</text>
  <text x="480" y="118" text-anchor="middle" fill="#a5d6a7" font-size="9">Dual H-Bridge Motor Driver</text>

  <!-- Heatsink representation -->
  <rect x="430" y="125" width="100" height="35" rx="3" fill="#424242" stroke="#616161" stroke-width="1"/>
  <line x1="445" y1="125" x2="445" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="460" y1="125" x2="460" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="475" y1="125" x2="475" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="490" y1="125" x2="490" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="505" y1="125" x2="505" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="520" y1="125" x2="520" y2="160" stroke="#555" stroke-width="1"/>
  <text x="480" y="147" text-anchor="middle" fill="#9e9e9e" font-size="8">heatsink</text>

  <!-- L298N LEFT side pins (inputs from ESP32) -->
  <!-- GND -->
  <circle cx="380" cy="185" r="5" fill="#ef5350"/>
  <text x="392" y="189" fill="#ef9a9a" font-size="10">GND</text>

  <!-- IN1 -->
  <circle cx="380" cy="210" r="5" fill="#66bb6a"/>
  <text x="392" y="214" fill="#a5d6a7" font-size="10">IN1</text>

  <!-- IN2 -->
  <circle cx="380" cy="235" r="5" fill="#66bb6a"/>
  <text x="392" y="239" fill="#a5d6a7" font-size="10">IN2</text>

  <!-- ENA -->
  <circle cx="380" cy="260" r="5" fill="#ffd54f"/>
  <text x="392" y="264" fill="#fff176" font-size="10">ENA ✕jumper</text>

  <!-- IN3 -->
  <circle cx="380" cy="295" r="5" fill="#42a5f5"/>
  <text x="392" y="299" fill="#90caf9" font-size="10">IN3</text>

  <!-- IN4 -->
  <circle cx="380" cy="320" r="5" fill="#42a5f5"/>
  <text x="392" y="324" fill="#90caf9" font-size="10">IN4</text>

  <!-- ENB -->
  <circle cx="380" cy="345" r="5" fill="#ffd54f"/>
  <text x="392" y="349" fill="#fff176" font-size="10">ENB ✕jumper</text>

  <!-- 5V OUT -->
  <circle cx="480" cy="80" r="5" fill="#ff7043"/>
  <text x="480" y="72" text-anchor="middle" fill="#ffab91" font-size="10">5V OUT</text>

  <!-- VIN (from battery) -->
  <circle cx="530" cy="80" r="5" fill="#ff5722"/>
  <text x="530" y="72" text-anchor="middle" fill="#ff8a65" font-size="10">VIN</text>

  <!-- L298N GND to battery -->
  <circle cx="460" cy="420" r="5" fill="#ef5350"/>
  <text x="460" y="435" text-anchor="middle" fill="#ef9a9a" font-size="9">GND</text>

  <!-- L298N RIGHT side motor outputs -->
  <!-- OUT1 -->
  <circle cx="580" cy="210" r="5" fill="#ce93d8"/>
  <text x="590" y="214" fill="#ce93d8" font-size="10">OUT1</text>

  <!-- OUT2 -->
  <circle cx="580" cy="235" r="5" fill="#ce93d8"/>
  <text x="590" y="239" fill="#ce93d8" font-size="10">OUT2</text>

  <!-- OUT3 -->
  <circle cx="580" cy="295" r="5" fill="#80cbc4"/>
  <text x="590" y="299" fill="#80cbc4" font-size="10">OUT3</text>

  <!-- OUT4 -->
  <circle cx="580" cy="320" r="5" fill="#80cbc4"/>
  <text x="590" y="324" fill="#80cbc4" font-size="10">OUT4</text>

  <!-- ═══════════════════════════════════════════
       RIGHT DC MOTOR
  ════════════════════════════════════════════ -->
  <ellipse cx="820" cy="222" rx="58" ry="38" fill="#263238" stroke="#ce93d8" stroke-width="2"/>
  <ellipse cx="820" cy="222" rx="38" ry="25" fill="#1c1c1e" stroke="#9c27b0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="820" y="218" text-anchor="middle" fill="#ce93d8" font-size="11" font-weight="bold">RIGHT</text>
  <text x="820" y="232" text-anchor="middle" fill="#ce93d8" font-size="11">MOTOR</text>
  <!-- motor shaft -->
  <rect x="875" y="218" width="20" height="8" rx="3" fill="#546e7a"/>
  <!-- terminal screws -->
  <circle cx="762" cy="213" r="5" fill="#9c27b0" stroke="#ce93d8" stroke-width="1"/>
  <circle cx="762" cy="231" r="5" fill="#9c27b0" stroke="#ce93d8" stroke-width="1"/>
  <text x="755" y="210" text-anchor="end" fill="#ce93d8" font-size="9">M+</text>
  <text x="755" y="234" text-anchor="end" fill="#ce93d8" font-size="9">M-</text>

  <!-- ═══════════════════════════════════════════
       LEFT DC MOTOR
  ════════════════════════════════════════════ -->
  <ellipse cx="820" cy="307" rx="58" ry="38" fill="#263238" stroke="#80cbc4" stroke-width="2"/>
  <ellipse cx="820" cy="307" rx="38" ry="25" fill="#1c1c1e" stroke="#00897b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="820" y="303" text-anchor="middle" fill="#80cbc4" font-size="11" font-weight="bold">LEFT</text>
  <text x="820" y="317" text-anchor="middle" fill="#80cbc4" font-size="11">MOTOR</text>
  <!-- motor shaft -->
  <rect x="875" y="303" width="20" height="8" rx="3" fill="#546e7a"/>
  <!-- terminal screws -->
  <circle cx="762" cy="298" r="5" fill="#00897b" stroke="#80cbc4" stroke-width="1"/>
  <circle cx="762" cy="316" r="5" fill="#00897b" stroke="#80cbc4" stroke-width="1"/>
  <text x="755" y="295" text-anchor="end" fill="#80cbc4" font-size="9">M+</text>
  <text x="755" y="319" text-anchor="end" fill="#80cbc4" font-size="9">M-</text>

  <!-- ═══════════════════════════════════════════
       BATTERY PACK
  ════════════════════════════════════════════ -->
  <rect x="80" y="510" width="150" height="70" rx="8" fill="#3e2723" stroke="#ff5722" stroke-width="2"/>
  <text x="155" y="532" text-anchor="middle" fill="#ff8a65" font-size="11" font-weight="bold">BATTERY PACK</text>
  <text x="155" y="548" text-anchor="middle" fill="#ffab91" font-size="9">7.4V LiPo / 18650</text>
  <!-- +/- terminals -->
  <rect x="88" y="557" width="28" height="16" rx="3" fill="#b71c1c" stroke="#ef5350" stroke-width="1"/>
  <text x="102" y="568" text-anchor="middle" fill="white" font-size="10" font-weight="bold">+</text>
  <rect x="124" y="557" width="28" height="16" rx="3" fill="#263238" stroke="#546e7a" stroke-width="1"/>
  <text x="138" y="568" text-anchor="middle" fill="white" font-size="10" font-weight="bold">−</text>
  <!-- positive terminal dot -->
  <circle cx="102" cy="510" r="5" fill="#ff5722"/>
  <!-- negative terminal dot -->
  <circle cx="138" cy="510" r="5" fill="#ef5350"/>

  <!-- ═══════════════════════════════════════════
       WIRES
  ════════════════════════════════════════════ -->

  <!-- GND wire: ESP32 GND → L298N GND (red dashed) -->
  <polyline points="195,135 290,135 290,185 380,185"
    fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- GPIO16 → IN1 (green) -->
  <polyline points="195,165 310,165 310,210 380,210"
    fill="none" stroke="#66bb6a" stroke-width="1.5"/>

  <!-- GPIO17 → IN2 (green) -->
  <polyline points="195,193 320,193 320,235 380,235"
    fill="none" stroke="#66bb6a" stroke-width="1.5"/>

  <!-- GPIO22 → ENA (yellow) -->
  <polyline points="195,221 330,221 330,260 380,260"
    fill="none" stroke="#ffd54f" stroke-width="1.5"/>

  <!-- GPIO18 → IN3 (blue) -->
  <polyline points="195,265 310,265 310,295 380,295"
    fill="none" stroke="#42a5f5" stroke-width="1.5"/>

  <!-- GPIO19 → IN4 (blue) -->
  <polyline points="195,293 320,293 320,320 380,320"
    fill="none" stroke="#42a5f5" stroke-width="1.5"/>

  <!-- GPIO23 → ENB (yellow) -->
  <polyline points="195,321 330,321 330,345 380,345"
    fill="none" stroke="#ffd54f" stroke-width="1.5"/>

  <!-- 5V OUT → ESP32 VIN (orange dashed) -->
  <polyline points="480,80 480,55 195,55 195,365"
    fill="none" stroke="#ff7043" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Battery + → L298N VIN -->
  <polyline points="102,510 102,490 530,490 530,80"
    fill="none" stroke="#ff5722" stroke-width="2"/>

  <!-- Battery − → common GND bus -->
  <polyline points="138,510 138,600 460,600 460,420"
    fill="none" stroke="#ef5350" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- L298N GND → ground bus join -->
  <polyline points="380,185 350,185 350,600"
    fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="350" cy="600" r="4" fill="#ef5350"/>
  <circle cx="460" cy="600" r="4" fill="#ef5350"/>
  <!-- GND bus line -->
  <line x1="138" y1="600" x2="500" y2="600" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="310" y="615" text-anchor="middle" fill="#ef5350" font-size="9">Common GND</text>

  <!-- OUT1 → Right Motor M+ (purple) -->
  <polyline points="580,210 690,210 690,213 762,213"
    fill="none" stroke="#ce93d8" stroke-width="1.5"/>

  <!-- OUT2 → Right Motor M- (purple) -->
  <polyline points="580,235 700,235 700,231 762,231"
    fill="none" stroke="#ce93d8" stroke-width="1.5"/>

  <!-- OUT3 → Left Motor M+ (teal) -->
  <polyline points="580,295 690,295 690,298 762,298"
    fill="none" stroke="#80cbc4" stroke-width="1.5"/>

  <!-- OUT4 → Left Motor M- (teal) -->
  <polyline points="580,320 700,320 700,316 762,316"
    fill="none" stroke="#80cbc4" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════
       LEGEND
  ════════════════════════════════════════════ -->
  <rect x="40" y="470" width="320" height="28" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="50" y="484" fill="#ccc" font-size="9" font-weight="bold">LEGEND</text>
  <line x1="100" y1="481" x2="125" y2="481" stroke="#66bb6a" stroke-width="2"/>
  <text x="128" y="485" fill="#a5d6a7" font-size="9">Direction (IN)</text>
  <line x1="200" y1="481" x2="225" y2="481" stroke="#ffd54f" stroke-width="2"/>
  <text x="228" y="485" fill="#fff176" font-size="9">PWM / Speed (EN)</text>
  <line x1="100" y1="493" x2="125" y2="493" stroke="#ff7043" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="128" y="497" fill="#ffab91" font-size="9">5V Power</text>
  <line x1="200" y1="493" x2="225" y2="493" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="228" y="497" fill="#ef9a9a" font-size="9">GND</text>

</svg>
